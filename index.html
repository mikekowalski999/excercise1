<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 한 줄 농담</title>
    <style>
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 24px;
        }
        .joke-question {
            font-size: 18px;
            font-weight: bold;
            color: #34495e;
            margin-bottom: 15px;
        }
        .joke-answer {
            font-size: 20px;
            color: #e74c3c;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.5s ease;
            margin-top: 20px;
            padding: 10px;
            border-top: 2px dashed #eee;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

<div class="container">
    <h1> 오늘의 유머 </h1>
    <div class="joke-question">Q. 세상에서 가장 미안해하는 동물은?</div>
    <button onclick="revealAnswer()">정답 보기</button>
    <div id="answer" class="joke-answer">A. 오소리 (오~ 소리~) 🦡</div>
</div>

<script>
    function revealAnswer() {
        var answer = document.getElementById('answer');
        answer.style.opacity = '1';
    }
</script>

</body>
</html>
